<!DOCTYPE html>
<html lang="en"></html>
<body>
<link rel="stylesheet" href="styles.css">
<div class="calcbody">
    <div class="rsltarea">RESULT</div>
    <div class="row1">
        <button class="n1">
         1
        </button>
        <button class="n2">
        2
        </button>
        <button class="n3">
        3
        </button>
    </div>
    <div class="row2">
        <button class="n4">
        4
        </button>
        <button class="n5">
        5
        </button>
        <button class="n6"">
        6  
        </button>
    </div>
    <div class="row3">
        <button class="n7">
        7
        </button>
        <button class="n8">
        8
        </button>
        <button class="n9">
        9   
        </button>
    </div>
    <div class="row4">
        <button class="plus">
         +
        </button>
        <button class="zero">
        0
        </button>
        <button class="mult">
        x    
        </button>
    </div>
    <div class="row5">
        <button class="sub">
        -
        </button>
        <button class="eq">
        =
        </button>
        <button class="divi">
        /    
        </button>
    </div>
</div>
<script src="main.js" defer></script>
</body>
</html>
